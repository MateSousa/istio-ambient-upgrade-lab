# app-b database credentials (plain Secret; lab-only). Mirrors app-a/secret.yaml:
# DB_PASSWORD is the plaintext demo_app password whose SCRAM verifier is stored
# in Postgres and in pgbouncer's userlist.txt. app-b reuses the SAME demo_app
# role as app-a (both are read clients of the widgets table). Production delivers
# this via External Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: app-b-db
  namespace: demo-app
type: Opaque
stringData:
  DB_PASSWORD: "demo_app_pw"
