# East-west L7 attachment for app-b, co-located with the app so it syncs on the
# same ArgoCD wave (4) as the app-b Service it references - the tenant waypoint
# Gateway itself comes up earlier (wave 3, demo/waypoint).
#
# GAMMA (service-mesh) HTTPRoute: parentRef is the app-b Service itself (not a
# Gateway). Combined with the Service's istio.io/use-waypoint: tenant-waypoint
# label, this is what makes the waypoint apply L7 policy to traffic addressed to
# app-b. Istiod continuously recomputes this route's status, so it becomes
# Programmed as soon as the app-b Service exists - no ArgoCD resync needed.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-b
  namespace: demo-app
  labels:
    app: app-b
spec:
  parentRefs:
    - group: ""
      kind: Service
      name: app-b
      port: 8000
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: app-b
          port: 8000
---
# _common-equivalent upstream timeouts for the waypoint's app-b upstream.
# Verbatim from the real per-tenant DestinationRule: bounded idle, capped
# requests-per-connection, least-request LB, and outlier ejection.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: app-b
  namespace: demo-app
  labels:
    app: app-b
spec:
  host: app-b
  trafficPolicy:
    connectionPool:
      http:
        idleTimeout: 55s
        maxRequestsPerConnection: 1000
    loadBalancer:
      simple: LEAST_REQUEST
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 10
      minHealthPercent: 50
