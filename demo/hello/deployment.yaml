# hello - a minimal HTTP workload used to prove ambient datapath enrollment.
# Any long-lived pod works; nginx is a small, multi-arch (amd64 + arm64) image
# that answers 200 on / - deliberately chosen over the amd64-only httpbin so the
# pod pulls and runs on Apple Silicon kind nodes. verify.sh asserts this pod's IP
# shows up in the ztunnel config_dump on the pod's node - real datapath proof,
# not just "pod Running + namespace labelled".
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello
  namespace: demo-app
  labels:
    app: hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
        - name: hello
          image: docker.io/library/nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
