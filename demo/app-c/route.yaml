# East-west L7 attachment for app-c, co-located with the app so it syncs on the
# same ArgoCD wave (4) as the app-c Service it references - the tenant waypoint
# Gateway itself comes up earlier (wave 3, demo/waypoint).
#
# GAMMA (service-mesh) HTTPRoute: parentRef is the app-c Service itself. Combined
# with the Service's istio.io/use-waypoint: tenant-waypoint label, this is what
# makes the waypoint apply L7 policy to traffic addressed to app-c. Istiod
# continuously recomputes this route's status, so it becomes Programmed as soon
# as the app-c Service exists - no ArgoCD resync needed.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-c
  namespace: demo-app
  labels:
    app: app-c
spec:
  parentRefs:
    - group: ""
      kind: Service
      name: app-c
      port: 8080
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: app-c
          port: 8080
---
# _common-equivalent upstream timeouts for the waypoint's app-c upstream.
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: app-c
  namespace: demo-app
  labels:
    app: app-c
spec:
  host: app-c
  trafficPolicy:
    connectionPool:
      http:
        idleTimeout: 55s
        maxRequestsPerConnection: 1000
    loadBalancer:
      simple: LEAST_REQUEST
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 10
      minHealthPercent: 50
