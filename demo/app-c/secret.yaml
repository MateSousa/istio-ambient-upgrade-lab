# app-c database credentials (plain Secret; lab-only). Mirrors app-a/secret.yaml
# and app-b/secret.yaml: DB_PASSWORD is the plaintext demo_app password whose
# SCRAM verifier is stored in Postgres and in pgbouncer's userlist.txt. app-c
# reuses the SAME demo_app role. Production delivers this via External Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: app-c-db
  namespace: demo-app
type: Opaque
stringData:
  DB_PASSWORD: "demo_app_pw"
