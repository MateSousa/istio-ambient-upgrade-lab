# app-a database credentials (plain Secret; lab-only). DB_PASSWORD is the
# plaintext demo_app password whose SCRAM verifier is stored in Postgres and in
# pgbouncer's userlist.txt. Production delivers this via External Secrets.
apiVersion: v1
kind: Secret
metadata:
  name: app-a-db
  namespace: demo-app
type: Opaque
stringData:
  DB_PASSWORD: "demo_app_pw"
