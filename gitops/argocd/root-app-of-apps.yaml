# Root app-of-apps. ArgoCD watches this repo's apps/ directory (recursively) and
# treats every Application manifest it finds there as a child app. apps/mesh/
# (the mesh umbrella + the demo workload), apps/data/ (Postgres + pgbouncer) and
# apps/apps/ (app-a) are populated; the observability/ directory holds a .gitkeep
# placeholder and is wired up by a later slice.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/MateSousa/istio-ambient-upgrade-lab.git
    targetRevision: HEAD
    path: apps/
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
