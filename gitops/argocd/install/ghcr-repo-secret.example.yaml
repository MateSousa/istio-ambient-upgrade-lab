# TEMPLATE - do not commit a real token.
#
# Registers the private GHCR OCI registry as an ArgoCD Helm repository so the
# `mesh` Application can pull the umbrella chart from ghcr.io/matesousa/charts.
#
# up.sh renders the real Secret from this template at apply time, substituting
# ${GHCR_TOKEN} (a PAT with read:packages). The rendered Secret is written to a
# gitignored path and applied with kubectl - it is never committed.
#
# Notes:
#   - url has NO oci:// prefix (ArgoCD adds it; enableOCI drives OCI mode).
#   - username + password are required because the package is PRIVATE.
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-charts-oci
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  name: ghcr-charts
  type: helm
  enableOCI: "true"
  url: ghcr.io/matesousa/charts
  username: matesousa
  password: ${GHCR_TOKEN}
