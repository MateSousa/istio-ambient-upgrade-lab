# data - the out-of-mesh Postgres + the in-mesh pgbouncer writer/reader pools.
#
# sync-wave "2": AFTER demo-hello (wave 1), which CREATES the ambient-labelled
# demo-app namespace that the pgbouncer objects here target. Same-wave sibling
# Applications are not ordered, so data must sit on a later wave than demo-hello
# to deterministically see demo-app already present (otherwise it fails until
# self-heal). destination.namespace is demo-data (created here via
# CreateNamespace); the pgbouncer objects carry an explicit demo-app namespace
# and are applied there - only ever into the already-ambient-labelled namespace,
# so they land in the datapath.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/MateSousa/istio-ambient-upgrade-lab.git
    targetRevision: HEAD
    path: demo/data
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
