# app-a - the ambient-enrolled Node/TypeORM client, head of the a->b->c chain.
#
# sync-wave "4": after the data app (wave 2) is Healthy, so pgbouncer-writer
# pods already exist when app-a is scheduled (its REQUIRED anti-affinity is
# evaluated against them) and Postgres is ready to serve /readyz + /query. Moved
# from wave 3 to 4 in slice 5 to sit alongside app-b/app-c and AFTER the tenant
# waypoint (wave 3): app-a's GET /chain calls app-b, so app-a should come up with
# its chain peers once the L7 path is Programmed.
#
# directory.recurse is false on purpose: demo/app-a holds the k8s manifests at
# its top level and the Node build context under demo/app-a/app/. recurse:false
# keeps ArgoCD reading only the top-level YAML and never descending into app/
# (which contains package.json etc. that are not Kubernetes manifests).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-a
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/MateSousa/istio-ambient-upgrade-lab.git
    targetRevision: HEAD
    path: demo/app-a
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
